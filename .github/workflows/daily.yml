name: Daily Job Pipeline + Deploy

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER STRATEGY
#
#   schedule (cron)    → full pipeline: download 502K jobs → score → generate → deploy
#   workflow_dispatch  → full pipeline (manual trigger from Actions tab)
#   push to main       → site-only rebuild using cached scored data (fast, no download)
#                        skips doc-only pushes (markdown, skills, setup files)
#
# This means:
#   • Job data refreshes once per day automatically ✅
#   • UI changes (site_generator.py) go live immediately on push ✅
#   • Markdown/skill edits don't waste Actions minutes ✅
#   • "New today" badge works correctly (scored data cached between runs) ✅
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 6am UTC daily — ~4 hours after job-board-aggregator updates (~2am UTC)
    - cron: '0 6 * * *'

  workflow_dispatch:  # Manual trigger from Actions tab

  push:
    branches: [main]
    paths-ignore:
      # Doc-only changes: skip the rebuild entirely
      - '**.md'
      - 'jobhunter/**'
      - 'classify-jobs/**'
      - 'tailor-resume/**'
      - '.jac/**'
      - 'setup'
      - 'RESUME.md.example'
      - 'config/profile.yaml.example'
      - 'LICENSE'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Force Node.js 24 for GitHub Actions (Node 20 deprecated June 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate dependencies
        run: python scripts/check_deps.py

      - name: Install Playwright (for Workday enrichment)
        if: github.event_name != 'push'
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run tests
        run: python -m pytest tests/unit/ -q

      # Compute date strings for cache keys
      - name: Set date variables
        run: |
          echo "TODAY=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          echo "YESTERDAY=$(date -u -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_ENV

      # ── Cache strategy ────────────────────────────────────────────────────
      # Restore yesterday's scored data so site_generator can diff it for
      # the "new today" badge. On push-only deploys this also provides the
      # scored data needed to regenerate the site without re-downloading.
      #
      # Key lookup order:
      #   1. scored-TODAY   (today's cron already ran — reuse it)
      #   2. scored-YESTERDAY (normal case — compare against it)
      #   3. scored-*       (fallback: any recent data, better than empty)
      # ──────────────────────────────────────────────────────────────────────
      - name: Restore scored data cache
        id: restore-scored
        uses: actions/cache/restore@v4
        with:
          path: data/scored/
          key: scored-${{ env.TODAY }}
          restore-keys: |
            scored-${{ env.YESTERDAY }}
            scored-

      # Restore enriched data so incremental skip works (skip re-fetching
      # job descriptions already enriched within 7 days).
      - name: Restore enriched data cache
        id: restore-enriched
        if: github.event_name != 'push'
        uses: actions/cache/restore@v4
        with:
          path: data/enriched/
          key: enriched-${{ env.TODAY }}
          restore-keys: |
            enriched-${{ env.YESTERDAY }}
            enriched-

      # ── Pipeline ──────────────────────────────────────────────────────────
      # schedule / workflow_dispatch → full pipeline (fresh download + score)
      # push                        → site-only rebuild from cached scored data
      # ──────────────────────────────────────────────────────────────────────
      - name: Run pipeline
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "=== Full pipeline (download + score + enrich + reblend + report + site) ==="
            python -m src.scraper --skip-live
            python -m src.matcher                       # title-based scoring (~13s)
            python -m src.enricher || echo "⚠️  Enricher failed — continuing without enrichment"
            python -m src.matcher --reblend || echo "⚠️  Reblend skipped — using title-only scores"
            python -m src.report
            python -m src.site_generator
          else
            echo "=== Push deploy: rebuilding site from cached scored data ==="
            # Find the most recent scored file (exclude .meta.json sidecar files)
            LATEST=$(ls -t data/scored/*.json 2>/dev/null | grep -v '\.meta\.json$' | head -1)
            if [[ -z "$LATEST" ]]; then
              echo "⚠️  No cached scored data — running full pipeline to bootstrap"
              python -m src.scraper --skip-live
              python -m src.matcher
              python -m src.report
              python -m src.site_generator
            else
              DATE=$(basename "$LATEST" .json)
              echo "Using scored data from $DATE"
              python -m src.site_generator --date "$DATE"
            fi
          fi

      # Save today's scored data so tomorrow's run can compute "new today"
      # Skip if today's key already exists in cache (cron ran twice, or push hit cache)
      - name: Save scored data cache
        if: steps.restore-scored.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: data/scored/
          key: scored-${{ env.TODAY }}

      # Save enriched data so tomorrow's run skips already-enriched jobs
      - name: Save enriched data cache
        if: github.event_name != 'push' && steps.restore-enriched.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: data/enriched/
          key: enriched-${{ env.TODAY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
