<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobHunter AI — Setup Required</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      text-align: center;
      background: #1e293b;
      border-radius: 16px;
      padding: 48px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    h1 { font-size: 28px; margin-bottom: 12px; }
    .emoji { font-size: 48px; margin-bottom: 16px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 16px; }
    code {
      background: #334155;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 14px;
      color: #38bdf8;
    }
    .steps {
      text-align: left;
      background: #0f172a;
      border-radius: 8px;
      padding: 20px 24px;
      margin-top: 20px;
      font-size: 14px;
      line-height: 2;
    }
    .steps span { color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎯</div>
    <h1>JobHunter AI</h1>
    <p>Your dashboard will appear here after you run the pipeline.</p>
    <div class="steps">
      <span>1.</span> Open Claude Code: <code>claude</code><br>
      <span>2.</span> Run: <code>/jobhunter</code><br>
      <span>3.</span> Refresh this page
    </div>
  </div>
</body>
</html>
